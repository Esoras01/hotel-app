<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBEKlu81rJxMqGEVUEPavV2tk00nfBwrXw",
    authDomain: "hotelapp-49a02.firebaseapp.com",
    projectId: "hotelapp-49a02",
    storageBucket: "hotelapp-49a02.firebasestorage.app",
    messagingSenderId: "59308487715",
    appId: "1:59308487715:web:8cb7a19ced064d26622d96"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.firestore();
  const auth = firebase.auth();

  function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    auth.signInWithEmailAndPassword(email, password)
      .then(() => alert("Login success"))
      .catch(err => alert(err.message));
  }

  function logout() {
    auth.signOut();
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("appPage").classList.remove("hidden");
      loadGuests();
    } else {
      document.getElementById("loginPage").classList.remove("hidden");
      document.getElementById("appPage").classList.add("hidden");
    }
  });

  function addGuest() {
    const name = document.getElementById("name").value;
    const room = document.getElementById("room").value;

    if (!name || !room) {
      alert("Enter all fields");
      return;
    }

    db.collection("guests").add({
      name,
      room,
      checkIn: new Date().toLocaleString()
    });
  }

  function deleteGuest(id) {
    db.collection("guests").doc(id).delete();
  }

  function loadGuests() {
    db.collection("guests").onSnapshot(snapshot => {
      const list = document.getElementById("guestList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const g = doc.data();
        list.innerHTML += `
          <div class="guest">
            <b>${g.name}</b> - Room ${g.room}<br>
            ${g.checkIn}<br>
            <button onclick="deleteGuest('${doc.id}')">Check-Out</button>
          </div>
        `;
      });
    });
  }
</script>
