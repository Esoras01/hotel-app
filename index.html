<!DOCTYPE html>
<html>
<head>
  <title>Hotel Manager</title>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h2 { color: #333; }
    input, button { padding: 10px; margin: 5px; }
    button { background: #007bff; color: white; border: none; border-radius: 5px; }
    .guest { background: white; padding: 10px; margin: 10px 0; border-radius: 8px; }
  </style>
</head>

<body>

<h2>🏨 Hotel Manager</h2>

<input id="name" placeholder="Guest Name">
<input id="room" placeholder="Room Number">
<button onclick="addGuest()">Check-In</button>

<h3>Guest List</h3>
<div id="guestList"></div>

<script>
  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addGuest() {
    const name = document.getElementById("name").value;
    const room = document.getElementById("room").value;

    if (!name || !room) {
      alert("Enter all fields");
      return;
    }

    db.collection("guests").add({
      name: name,
      room: room,
      checkIn: new Date().toLocaleString()
    });

    document.getElementById("name").value = "";
    document.getElementById("room").value = "";
  }

  function deleteGuest(id) {
    db.collection("guests").doc(id).delete();
  }

  function loadGuests() {
    db.collection("guests").onSnapshot(snapshot => {
      const list = document.getElementById("guestList");
      list.innerHTML = "";

      snapshot.forEach(doc => {
        const guest = doc.data();
        list.innerHTML += `
          <div class="guest">
            <b>${guest.name}</b> - Room ${guest.room}<br>
            ${guest.checkIn}<br>
            <button onclick="deleteGuest('${doc.id}')">Check-Out</button>
          </div>
        `;
      });
    });
  }

  loadGuests();
</script>

</body>
</html>
